name: CI Build & Deploy (Simple)

on:
  push:
    branches:
      - main
    paths:
      - 'reactapp/**'
      - '.github/workflows/ci-build-simple.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: multinode-gitops-cluster/reactapp

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Convert repository owner to lowercase
        id: repo
        run: |
          echo "owner_lc=${OWNER,,}" >> $GITHUB_OUTPUT
          echo "image_name=ghcr.io/${OWNER,,}/${{ env.IMAGE_NAME_PREFIX }}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.image_name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./reactapp
          file: ./reactapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          
      - name: Update Kubernetes deployment manifest
        run: |
          # Use the SHA tag for deployment (with lowercase owner)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_PREFIX }}:sha-${{ github.sha }}"
          
          echo "Updating deployment.yaml with image: $IMAGE_TAG"
          
          # Update deployment.yaml
          sed -i "s|image:.*reactapp.*|image: ${IMAGE_TAG}|g" k8s/reactapp/deployment.yaml
          
          # Show the change
          echo "Updated deployment.yaml:"
          cat k8s/reactapp/deployment.yaml | grep -A 2 "image:"
          
      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/reactapp/deployment.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update reactapp image to sha-${{ github.sha }}"
            git push
          fi
          
      - name: Create deployment summary
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME_PREFIX }}:sha-${{ github.sha }}"
          
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status**: Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${IMAGE_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**: " >> $GITHUB_STEP_SUMMARY
          echo "- \`sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will automatically sync this change to your Kubernetes cluster." >> $GITHUB_STEP_SUMMARY
