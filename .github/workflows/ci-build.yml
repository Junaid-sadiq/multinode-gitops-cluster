name: CI Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'reactapp/**'
      - '.github/workflows/ci-build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/reactapp

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write  # For pushing manifest changes
      packages: write  # For pushing to GHCR
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-sha-tag: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./reactapp
          file: ./reactapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          
      - name: Generate SBOM
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Upload SBOM
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    continue-on-error: true  # Don't fail workflow if vulnerabilities found
    permissions:
      contents: read
      security-events: write
      
    steps:
      - name: Run Trivy vulnerability scanner
        continue-on-error: true  # Continue even if vulnerabilities found
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'  # Don't fail on vulnerabilities
          
      - name: Upload Trivy results to GitHub Security
        if: always()  # Upload even if scan found issues
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          
  update-gitops-manifest:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-push]  # Removed security-scan dependency
    permissions:
      contents: write  # Need write permission to push changes
    
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Update Kubernetes manifests
        run: |
          # Use the SHA tag directly
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          
          echo "Updating deployment.yaml with image: ${IMAGE_TAG}"
          
          # Update deployment.yaml
          if [ -f "k8s/reactapp/deployment.yaml" ]; then
            sed -i "s|image:.*reactapp.*|image: ${IMAGE_TAG}|g" k8s/reactapp/deployment.yaml
            echo "✓ Updated k8s/reactapp/deployment.yaml"
            cat k8s/reactapp/deployment.yaml | grep -A 2 "image:"
          else
            echo "✗ k8s/reactapp/deployment.yaml not found"
            exit 1
          fi
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/reactapp/deployment.yaml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update reactapp image to sha-${{ github.sha }}"
            git push
            echo "✓ Changes committed and pushed"
          fi
          
  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [build-and-push, update-gitops-manifest, security-scan]
    if: always()
    
    steps:
      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status**: \`${{ needs.build-and-push.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Security Scan**: \`${{ needs.security-scan.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Manifest Update**: \`${{ needs.update-gitops-manifest.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Check [Security tab](/${{ github.repository }}/security/code-scanning) for vulnerability report" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor ArgoCD for automatic sync" >> $GITHUB_STEP_SUMMARY
          echo "- Access app at \`http://NODE_IP:30007\`" >> $GITHUB_STEP_SUMMARY
