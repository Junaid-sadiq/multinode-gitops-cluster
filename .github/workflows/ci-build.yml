name: CI Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'reactapp/**'
      - '.github/workflows/ci-build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/reactapp

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./reactapp
          file: ./reactapp/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          
      - name: Generate SBOM
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          
      - name: Upload SBOM
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    permissions:
      contents: read
      security-events: write
      
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-push.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          
  update-gitops-manifest:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build-and-push, security-scan]
    
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: gitops-repo
          
      - name: Update Kubernetes manifests
        run: |
          cd gitops-repo
          
          # Extract image tag
          IMAGE_TAG=$(echo "${{ needs.build-and-push.outputs.image-tag }}" | cut -d',' -f1)
          
          # Update kustomization or deployment YAML
          # Assuming manifests are in k8s/ directory
          if [ -f "k8s/reactapp/deployment.yaml" ]; then
            sed -i "s|image:.*reactapp.*|image: ${IMAGE_TAG}|g" k8s/reactapp/deployment.yaml
          fi
          
          # Or update kustomization.yaml if using Kustomize
          if [ -f "k8s/reactapp/kustomization.yaml" ]; then
            cd k8s/reactapp
            kustomize edit set image reactapp=${IMAGE_TAG}
          fi
          
      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: update reactapp image to ${{ github.sha }}"
            git push
          )
          
  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: update-gitops-manifest
    if: always()
    
    steps:
      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ needs.build-and-push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ needs.update-gitops-manifest.result }}" >> $GITHUB_STEP_SUMMARY
