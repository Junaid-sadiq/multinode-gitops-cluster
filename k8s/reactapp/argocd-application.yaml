apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reactapp-ui
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/Junaid-sadiq/multinode-gitops-cluster.git
    targetRevision: main
    path: k8s/reactapp
    
  destination:
    server: https://kubernetes.default.svc
    namespace: reactapp
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
